<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7209b7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f77f00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06d6a0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Outer orbit -->
  <ellipse cx="50" cy="50" rx="42" ry="16" fill="none" stroke="url(#grad)" stroke-width="3" opacity="0.6"/>

  <!-- Middle orbit (rotated 60°) -->
  <ellipse cx="50" cy="50" rx="42" ry="16" fill="none" stroke="url(#grad)" stroke-width="3" opacity="0.6" transform="rotate(60 50 50)"/>

  <!-- Inner orbit (rotated 120°) -->
  <ellipse cx="50" cy="50" rx="42" ry="16" fill="none" stroke="url(#grad)" stroke-width="3" opacity="0.6" transform="rotate(120 50 50)"/>

  <!-- Central "e" letter -->
  <text x="50" y="58" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="url(#grad)" text-anchor="middle" dominant-baseline="middle">e</text>
</svg>
